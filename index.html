<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkyLine Airlines</title>

<style>
body { margin:0; font-family:Segoe UI; background:#eef2f7; }

header {
    background:#0a1f44;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
}
nav a {
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-weight:bold;
}

.hero {
    height:300px;
    background:url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:30px;
}

.booking {
    background:white;
    margin:-50px auto;
    padding:20px;
    width:90%;
    border-radius:10px;
    text-align:center;
}

input,select {
    padding:10px;
    margin:8px;
}

button {
    padding:10px 20px;
    background:#0a1f44;
    color:white;
    border:none;
}

.ticket {
    margin-top:20px;
    padding:15px;
    background:#f9f9f9;
    border-radius:10px;
}

footer {
    background:#0a1f44;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
<h2>SkyLine Airlines ✈️</h2>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<div class="hero">Book Your Premium Flight ✈️</div>

<div class="booking">
<h2>Flight Booking</h2>

<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input type="date" id="date">

<button onclick="book()">Book</button>

<h3>Search by PNR</h3>
<input id="searchPNR" placeholder="Enter PNR">
<button onclick="searchPNR()">Search</button>

<div id="output"></div>
</div>

<footer>Contact: 8000993480</footer>

<script>
function book(){
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;
    let date = document.getElementById("date").value;

    if(!from || !to || !date){
        alert("Fill all fields!");
        return;
    }

    let pnr = "PNR" + Math.floor(Math.random()*100000);

    let booking = {from,to,date,pnr};

    let all = JSON.parse(localStorage.getItem("bookings")) || [];
    all.push(booking);

    localStorage.setItem("bookings", JSON.stringify(all));

    showTicket(booking);
}

function showTicket(data){
    document.getElementById("output").innerHTML = `
    <div class="ticket">
    <h3>🎟 Ticket</h3>
    <p>PNR: ${data.pnr}</p>
    <p>${data.from} → ${data.to}</p>
    <p>Date: ${data.date}</p>
    <button onclick="window.print()">Download / Print</button>
    </div>`;
}

function searchPNR(){
    let pnr = document.getElementById("searchPNR").value;
    let all = JSON.parse(localStorage.getItem("bookings")) || [];

    let found = all.find(b => b.pnr === pnr);

    if(found){
        showTicket(found);
    } else {
        document.getElementById("output").innerHTML = "❌ No booking found";
    }
}
</script>

</body>
</html>
