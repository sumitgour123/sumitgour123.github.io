<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - SkyLine Airlines</title>

<style>
body { margin:0; font-family: Arial; }
header, footer {
    background:#002147;
    color:white;
    padding:15px;
    text-align:center;
}
nav a {
    color:white;
    margin:10px;
    text-decoration:none;
}
.content {
    padding: 20px;
    text-align: center;
}
input, textarea {
    width: 80%;
    padding: 10px;
    margin: 8px;
}
button {
    padding: 10px 20px;
    background:#002147;
    color:white;
    border:none;
}
</style>
</head>

<body>

<header>
    <h2>SkyLine Airlines</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="content">
    <h2>Contact Us</h2>
    <p>Phone: 8000993480</p>

    <h3>Send Message</h3>
    <input type="text" id="name" placeholder="Your Name"><br>
    <textarea id="msg" placeholder="Your Message"></textarea><br>
    <button onclick="sendMsg()">Send</button>

    <p id="response"></p>
</div>

<footer>
    Contact: 8000993480
</footer>

<script>
function sendMsg() {
    let name = document.getElementById("name").value;
    if(name === "") {
        document.getElementById("response").innerHTML = "Enter your name!";
    } else {
        document.getElementById("response").innerHTML =
        "Thank you " + name + "! We will contact you soon.";
    }
}
</script>

</body>
</html>
