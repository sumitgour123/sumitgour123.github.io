<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

#chat {
  height: 400px;
  overflow-y: auto;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}

input {
  width: 75%;
  padding: 10px;
}

button {
  padding: 10px;
  background: #22c55e;
  border: none;
  color: white;
}

.user { color: #38bdf8; }
.bot { color: #22c55e; }
</style>
</head>

<body>

<div class="container">
<h2>🤖 AI Study Assistant</h2>

<div id="chat"></div>

<input id="msg" placeholder="Ask anything...">
<button onclick="send()">Send</button>
</div>

<script>
async function send(){
 let msg = document.getElementById("msg").value;

 document.getElementById("chat").innerHTML += "<p class='user'>You: "+msg+"</p>";

 let res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
  method:"POST",
  headers:{
   "Authorization":"Bearer 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",
   "Content-Type":"application/json"
  },
  body: JSON.stringify({
   model:"openai/gpt-3.5-turbo",
   messages:[{role:"user",content:msg}]
  })
 });

 let data = await res.json();

 let reply = data.choices[0].message.content;

 document.getElementById("chat").innerHTML += "<p class='bot'>AI: "+reply+"</p>";
}
</script>

</body>
</html>
