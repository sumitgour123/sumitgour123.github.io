<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan QR</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 250px;
            height: 250px;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Scan & Pay ₹10</h2>
    <p>Use any UPI app to scan the QR code below</p>

    <!-- Your QR Image -->
    <img src="qrsumit.png" alt="QR Code">

    <br>
    <button onclick="goBack()">Go Back</button>
</div>

<script>
    function goBack() {
        window.location.href = "index.html";
    }
</script>

</body>
</html>
