<!DOCTYPE html>
<html>
<head>
<title>AI Study Assistant</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial;
  background: #0b0f19;
  color: #e2e8f0;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:600px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#111827;
  border-bottom:1px solid #1f2937;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

/* Chat bubbles */
.msg{
  max-width:75%;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  line-height:1.4;
}

.user{
  background:#2563eb;
  color:white;
  margin-left:auto;
  border-bottom-right-radius:0;
}

.ai{
  background:#1f2937;
  border-bottom-left-radius:0;
}

/* Input area */
.input-box{
  display:flex;
  padding:10px;
  background:#111827;
  border-top:1px solid #1f2937;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 16px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

/* Scrollbar */
#chat::-webkit-scrollbar{
  width:5px;
}
#chat::-webkit-scrollbar-thumb{
  background:#374151;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">🤖 AI Study Assistant</div>

<div id="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Ask something...">
  <button onclick="send()">Send</button>
</div>

</div>

<script>

function smartReply(msg){

 msg = msg.toLowerCase();

 if(msg.includes("plassey")){
   return "Battle of Plassey (1757) me British jeet gaye the aur India me unka control start hua.";
 }

 if(msg.includes("gandhi")){
   return "Gandhi ji ne ahimsa aur satyagraha se freedom struggle lead kiya.";
 }

 if(msg.includes("exam")){
   return "Exam ke liye important topics revise karo + PYQ solve karo 🔥";
 }

 if(msg.includes("hello") || msg.includes("hi")){
   return "Hello bhai 😎 kya padhna hai aaj?";
 }

 return "Hmm 🤔 thoda aur clear pucho bhai, main help karne ki koshish karta hu.";
}

function addMessage(text, type){
 let div = document.createElement("div");
 div.className = "msg " + type;
 div.innerText = text;

 document.getElementById("chat").appendChild(div);
 document.getElementById("chat").scrollTop = 9999;
}

function send(){
 let msg = document.getElementById("msg").value;

 if(!msg) return;

 addMessage(msg, "user");

 document.getElementById("msg").value = "";

 let typing = document.createElement("div");
 typing.className = "msg ai";
 typing.innerText = "Typing...";
 document.getElementById("chat").appendChild(typing);

 setTimeout(()=>{
   typing.remove();
   let reply = smartReply(msg);
   addMessage(reply, "ai");
 },1000);
}

</script>

</body>
</html>
