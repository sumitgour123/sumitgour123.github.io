<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkyLine Airlines</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f4f4f4;
    }

    header {
        background: #002147;
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
    }

    nav a {
        color: white;
        margin-left: 15px;
        text-decoration: none;
        font-weight: bold;
    }

    .container {
        text-align: center;
        padding: 30px;
    }

    input, select {
        padding: 10px;
        margin: 10px;
        width: 200px;
    }

    button {
        padding: 10px 20px;
        background: #002147;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #004080;
    }

    .ticket {
        margin-top: 20px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        display: inline-block;
    }

    footer {
        background: #002147;
        color: white;
        text-align: center;
        padding: 10px;
        position: fixed;
        bottom: 0;
        width: 100%;
    }
</style>
</head>

<body>

<header>
    <h2>SkyLine Airlines ✈️</h2>
    <nav>
        <a href="#">Home</a>
    </nav>
</header>

<div class="container">
    <h2>Book Your Flight</h2>

    <input type="text" id="from" placeholder="From"><br>
    <input type="text" id="to" placeholder="To"><br>

    <input type="date" id="date"><br>

    <select id="class">
        <option>Economy</option>
        <option>Business</option>
    </select><br>

    <button onclick="bookFlight()">Book Now</button>

    <div id="ticket"></div>
</div>

<footer>
    Contact: 8000993480
</footer>

<script>
function bookFlight() {
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;
    let date = document.getElementById("date").value;
    let travelClass = document.getElementById("class").value;

    if(from === "" || to === "" || date === "") {
        alert("Please fill all fields!");
        return;
    }

    let booking = {
        from,
        to,
        date,
        travelClass
    };

    // Save to LocalStorage
    localStorage.setItem("booking", JSON.stringify(booking));

    showTicket();
}

function showTicket() {
    let data = JSON.parse(localStorage.getItem("booking"));

    if(data) {
        document.getElementById("ticket").innerHTML = `
            <div class="ticket">
                <h3>🎫 Your Ticket</h3>
                <p><b>From:</b> ${data.from}</p>
                <p><b>To:</b> ${data.to}</p>
                <p><b>Date:</b> ${data.date}</p>
                <p><b>Class:</b> ${data.travelClass}</p>
            </div>
        `;
    }
}

// Load ticket on refresh
showTicket();
</script>

</body>
</html>
