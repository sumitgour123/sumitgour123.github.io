<!DOCTYPE html>
<html>
<head>
<title>AI Study Assistant</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b0f19;
  color:white;
}

.container{
  max-width:600px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  text-align:center;
  background:#111827;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.ai{
  background:#1f2937;
}

.input-box{
  display:flex;
  padding:10px;
}

input{
  flex:1;
  padding:10px;
}

button{
  padding:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">AI Study Assistant 🤖</div>

<div id="chat"></div>

<div class="input-box">
  <input id="msg">
  <button onclick="send()">Send</button>
</div>

</div>

<script>

function smartReply(msg){
 msg = msg.toLowerCase();

 if(msg.includes("hi") || msg.includes("hello")){
   return "Hello bhai 😎";
 }

 if(msg.includes("exam")){
   return "Exam ke liye revise karo 🔥";
 }

 return "Samajh nahi aaya 😅";
}

function send(){
 let msgBox = document.getElementById("msg");
 let msg = msgBox.value;

 if(msg === "") return;

 let chat = document.getElementById("chat");

 let userDiv = document.createElement("div");
 userDiv.className = "msg user";
 userDiv.innerText = msg;
 chat.appendChild(userDiv);

 msgBox.value = "";

 let aiDiv = document.createElement("div");
 aiDiv.className = "msg ai";
 aiDiv.innerText = "Typing...";
 chat.appendChild(aiDiv);

 setTimeout(function(){
   aiDiv.innerText = smartReply(msg);
   chat.scrollTop = chat.scrollHeight;
 },1000);
}

</script>

</body>
</html>
