<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Study Assistant</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b0f19;
  color:white;
}

/* Container full screen */
.container{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* Header */
.header{
  padding:15px;
  text-align:center;
  background:#111827;
  font-size:18px;
  font-weight:bold;
}

/* Chat area */
#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* Messages */
.msg{
  padding:10px 12px;
  margin:6px;
  border-radius:12px;
  max-width:75%;
  font-size:14px;
  line-height:1.4;
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.ai{
  background:#1f2937;
}

/* Input area (fixed bottom) */
.input-box{
  display:flex;
  padding:10px;
  background:#111827;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:16px;
  outline:none;
}

button{
  margin-left:8px;
  padding:12px 16px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-size:16px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">🤖 AI Study Assistant</div>

<div id="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Ask something...">
  <button onclick="send()">Send</button>
</div>

</div>

<script>

function smartReply(msg){
 msg = msg.toLowerCase();

 if(msg.includes("hi") || msg.includes("hello")){
   return "Hello bhai 😎 kya padhna hai aaj?";
 }

 if(msg.includes("exam")){
   return "Exam ke liye revise karo + important topics pe focus karo 🔥";
 }

 if(msg.includes("plassey")){
   return "Battle of Plassey 1757 me hui thi aur British jeet gaye the.";
 }

 return "Samajh nahi aaya 😅 thoda aur clear pucho.";
}

function send(){
 let msgBox = document.getElementById("msg");
 let msg = msgBox.value.trim();

 if(msg === "") return;

 let chat = document.getElementById("chat");

 let userDiv = document.createElement("div");
 userDiv.className = "msg user";
 userDiv.innerText = msg;
 chat.appendChild(userDiv);

 msgBox.value = "";

 let aiDiv = document.createElement("div");
 aiDiv.className = "msg ai";
 aiDiv.innerText = "Typing...";
 chat.appendChild(aiDiv);

 chat.scrollTop = chat.scrollHeight;

 setTimeout(function(){
   aiDiv.innerText = smartReply(msg);
   chat.scrollTop = chat.scrollHeight;
 },800);
}

</script>

</body>
</html>
