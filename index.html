<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Resume Builder Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h2>AI Resume Builder</h2>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <select onchange="changeTemplate(this.value)">
      <option value="template1">Template 1</option>
      <option value="template2">Template 2</option>
    </select>
  </div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <input type="file" id="photo">

    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="title" placeholder="Job Title">

    <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
    <textarea id="education" placeholder="Education"></textarea>
    <textarea id="experience" placeholder="Experience"></textarea>

    <button onclick="generateResume()">Generate</button>
    <button onclick="aiSuggest()">✨ AI Suggest</button>
    <button onclick="downloadPDF()">Download PDF</button>
  </div>

  <!-- RIGHT -->
  <div class="right template1" id="resume">
    <div class="header">
      <img id="r-photo" src="">
      <div>
        <h1 id="r-name">Your Name</h1>
        <p id="r-title">Your Title</p>
      </div>
    </div>

    <div class="section">
      <h3>Skills</h3>
      <div id="r-skills" class="tags"></div>
    </div>

    <div class="section">
      <h3>Education</h3>
      <p id="r-education"></p>
    </div>

    <div class="section">
      <h3>Experience</h3>
      <p id="r-experience"></p>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
