<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro AI Study Assistant - Sumit Gour</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
    color: white;
}
header {
    text-align: center;
    padding: 20px;
    background: #020617;
}
.container {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}
.chat-box {
    width: 95%;
    max-width: 800px;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}
#chat {
    height: 350px;
    overflow-y: auto;
}
.message {
    margin: 10px;
    padding: 10px;
    border-radius: 8px;
}
.user {
    background: #2563eb;
    text-align: right;
}
.ai {
    background: #334155;
}
.input-area {
    display: flex;
    margin-top: 10px;
}
input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
}
button {
    padding: 10px;
    margin-left: 5px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background: #16a34a;
}
.tools {
    text-align: center;
    margin-top: 10px;
}
.tool {
    display: inline-block;
    margin: 5px;
    padding: 8px 12px;
    background: #3b82f6;
    border-radius: 5px;
    cursor: pointer;
}
.tool:hover {
    background: #2563eb;
}
</style>
</head>

<body>

<header>
    <h1>Pro AI Study Assistant</h1>
    <p>Created by <strong>Sumit Gour</strong></p>
</header>

<div class="container">
    <div class="chat-box">
        <div id="chat"></div>

        <div class="input-area">
            <input type="text" id="question" placeholder="Ask anything...">
            <button onclick="askAI()">Send</button>
            <button onclick="startVoice()">🎤</button>
        </div>

        <div class="tools">
            <div class="tool" onclick="notes()">📘 Notes</div>
            <div class="tool" onclick="quiz()">🧠 Quiz</div>
            <div class="tool" onclick="clearChat()">🗑 Clear</div>
        </div>
    </div>
</div>

<script>

// LOAD SAVED CHAT
window.onload = function() {
    document.getElementById("chat").innerHTML = localStorage.getItem("chat") || "";
};

// SAVE CHAT
function saveChat() {
    localStorage.setItem("chat", document.getElementById("chat").innerHTML);
}

// SMART AI ENGINE
function getAIResponse(q) {
    q = q.toLowerCase();

    if (q.includes("2+2")) return "2 + 2 = 4";
    if (q.includes("math")) return "Math: Practice formulas + solve daily questions step-by-step.";
    if (q.includes("science")) return "Science: Understand concepts using diagrams and real-life examples.";
    if (q.includes("gravity")) return "Gravity is the force discovered by Newton that pulls objects toward Earth.";
    if (q.includes("history")) return "History: Learn with stories and timelines for better memory.";
    if (q.includes("html")) return "HTML is used to structure websites (headings, images, links).";
    if (q.includes("javascript")) return "JavaScript adds interactivity like buttons, games, and logic.";
    if (q.includes("exam")) return "Exam tip: Revise daily, solve papers, and manage time.";

    return "🤖 I understand: '" + q + "'. Try asking about Math, Science, HTML, Exams etc.";
}

// CHAT FUNCTION
function askAI() {
    let input = document.getElementById("question");
    let chat = document.getElementById("chat");

    let question = input.value.trim();
    if (!question) return;

    chat.innerHTML += `<div class="message user">${question}</div>`;
    chat.innerHTML += `<div class="message ai">Thinking...</div>`;

    setTimeout(() => {
        let responses = document.querySelectorAll(".ai");
        responses[responses.length - 1].innerText = getAIResponse(question);
        saveChat();
    }, 700);

    input.value = "";
}

// VOICE INPUT
function startVoice() {
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.onresult = function(event) {
        document.getElementById("question").value = event.results[0][0].transcript;
    };

    recognition.start();
}

// NOTES
function notes() {
    let chat = document.getElementById("chat");
    chat.innerHTML += `<div class="message ai">📘 Notes Tips:\n- Break topics\n- Use bullet points\n- Revise daily</div>`;
    saveChat();
}

// QUIZ
function quiz() {
    let chat = document.getElementById("chat");
    chat.innerHTML += `<div class="message ai">🧠 Quiz:\n1. 5+5=?\n2. Who discovered gravity?\n3. What is HTML?</div>`;
    saveChat();
}

// CLEAR CHAT
function clearChat() {
    localStorage.removeItem("chat");
    document.getElementById("chat").innerHTML = "";
}

</script>

</body>
</html>
