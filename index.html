<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumit Gour Cars</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        header {
            background-color: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 32px;
        }
        header p {
            margin: 5px 0 0;
            font-size: 18px;
            color: #ccc;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: #ff9800;
        }
        .hero {
            padding: 50px;
            text-align: center;
            background: url('https://images.unsplash.com/photo-1511919884226-fd3cad34687c') no-repeat center/cover;
            color: white;
        }
        .hero h2 {
            font-size: 40px;
        }
        .cars {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            flex-wrap: wrap;
        }
        .car-card {
            background: white;
            padding: 15px;
            margin: 10px;
            width: 250px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
        }
        .car-card img {
            width: 100%;
            border-radius: 5px;
        }
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Sumit Gour Cars</h1>
    <p>Owner: <strong>Sumit Gour</strong></p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Cars</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Find Your Dream Car</h2>
    <p>Best deals on top-quality cars</p>
</section>

<section class="cars">
    <div class="car-card">
        <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" alt="Car 1">
        <h3>Luxury Sedan</h3>
        <p>₹15,00,000</p>
    </div>

    <div class="car-card">
        <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a" alt="Car 2">
        <h3>Sports Car</h3>
        <p>₹25,00,000</p>
    </div>

    <div class="car-card">
        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Car 3">
        <h3>SUV</h3>
        <p>₹18,00,000</p>
    </div>
</section>

<footer>
    <p>&copy; 2026 Sumit Gour Cars | All Rights Reserved</p>
</footer>

</body>
</html>
